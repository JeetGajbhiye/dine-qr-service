version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: restaurant-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: restaurant_qr_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./restaurant-qr-backend
    container_name: restaurant-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: restaurant_qr_db
      DB_USER: root
      DB_PASSWORD: rootpass
      JWT_SECRET: ChangeThisSuperSecretKeyForJWTThatIsAtLeast32CharsLong!
      ADMIN_USER: admin
      ADMIN_PASS: admin@123
      NOTIFICATIONS_ENABLED: "false"
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build: ./restaurant-qr-frontend
    container_name: restaurant-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
    restart: unless-stopped

volumes:
  mysql_data:
