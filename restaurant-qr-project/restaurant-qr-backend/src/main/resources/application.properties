# ============================================
# Server
# ============================================
server.port=8080
server.servlet.context-path=/

# ============================================
# MySQL Datasource
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/restaurant_qr_db?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA / Hibernate
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false

# ============================================
# Jackson
# ============================================
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.default-property-inclusion=non_null

# ============================================
# JWT Auth
# ============================================
app.jwt.secret=${JWT_SECRET:ChangeThisSuperSecretKeyForJWTThatIsAtLeast32CharsLong!}
app.jwt.expiration-ms=86400000
app.admin.username=${ADMIN_USER:admin}
app.admin.password=${ADMIN_PASS:admin@123}

# ============================================
# Mail (Gmail SMTP) - configure with your app password
# ============================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USER:your-email@gmail.com}
spring.mail.password=${MAIL_PASS:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ============================================
# Twilio SMS - configure with your credentials
# ============================================
twilio.account.sid=${TWILIO_SID:ACxxxxxxxxxxxxxxxxxxxx}
twilio.auth.token=${TWILIO_TOKEN:your_twilio_token}
twilio.from.number=${TWILIO_FROM:+1234567890}

# ============================================
# Notifications toggle
# ============================================
notifications.enabled=${NOTIFICATIONS_ENABLED:false}

# ============================================
# Logging
# ============================================
logging.level.org.springframework.web=INFO
logging.level.com.restaurant.qrmenu=DEBUG
